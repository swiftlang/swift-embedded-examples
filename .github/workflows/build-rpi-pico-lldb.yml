name: Raspberry Pi Pico LLDB examples

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: [self-hosted, macos, tahoe, ARM64]

    strategy:
      fail-fast: false
      matrix:
        example: [rpi-pico-lldb/start-tutorial, rpi-pico-lldb/finished-tutorial]
        board: [RP2040, RP2350]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.11

      - name: Install Swift
        uses: ./.github/actions/install-swift

      - name: Build ${{ matrix.example }}
        working-directory: ${{ matrix.example }}
        run: make BOARD=${{ matrix.board }}
